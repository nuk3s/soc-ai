id: e2-urlhaus-pe-delivery
name: "URLhaus-listed malware delivery URL"
version: 1
tier: easy
story: |
  Endpoint 10.0.0.71 GETs an executable from an HTTP host on the URLhaus
  blocklist. The HTTP path uses a .png extension but the response body is a
  PE (Windows executable). ET DROP / ET HUNTING signatures fire; the URLhaus
  match on the destination IP is decisive.
attack:
  - T1105   # Ingress Tool Transfer
  - T1071.001  # Application Layer Protocol: Web Protocols
sigma_refs: []

ground_truth:
  verdict: true_positive
  confidence_min: 0.75
  required_citation_kinds:
    - blocklist_hit
    - typed_path
    - prefetch_pivot
  expected_actions:
    - kind: escalate
    - kind: block_indicator
      target_field: destination.ip
  expected_field_reconciliation: false

events:
  - index: logs-synth-suricata-alert
    time_offset_seconds: 0
    is_triage_target: true
    fields:
      "@timestamp": "{{ run_time }}"
      event.dataset: suricata.alert
      event.module: suricata
      event.kind: alert
      event.category: [network, intrusion_detection]
      event.action: allowed
      event.severity: 1
      source.ip: "10.0.0.71"
      source.port: 50123
      destination.ip: "193.42.39.117"
      destination.port: 80
      network.transport: tcp
      network.protocol: http
      network.community_id: "{{ community_id(source.ip, source.port, destination.ip, destination.port, 'tcp') }}"
      rule.name: "ET DROP urlhaus.abuse.ch malware distribution URL"
      rule.category: "Misc Attack"
      rule.signature: "9100001"
      classtype: trojan-activity
      signature_severity: Major
      host.name: "so-sensor-1"
      agent.name: "so-sensor-1"
      synth.scenario_id: e2-urlhaus-pe-delivery
      synth.scenario_version: 1

  - index: logs-synth-zeek-http
    time_offset_seconds: 0
    is_triage_target: false
    fields:
      "@timestamp": "{{ run_time }}"
      event.dataset: zeek.http
      event.module: zeek
      event.kind: event
      source.ip: "10.0.0.71"
      source.port: 50123
      destination.ip: "193.42.39.117"
      destination.port: 80
      network.community_id: "{{ same_as_triage }}"
      zeek.http.method: "GET"
      zeek.http.host: "193.42.39.117"
      zeek.http.uri: "/img/preview.png"
      zeek.http.status_code: 200
      zeek.http.user_agent: "Mozilla/4.0 (compatible; MSIE 7.0)"
      zeek.http.resp_mime_types: ["application/x-dosexec"]
      zeek.http.resp_fuids: ["FmKj1jJ3CMc7TsQ8Mc"]
      synth.scenario_id: e2-urlhaus-pe-delivery

  - index: logs-synth-zeek-files
    time_offset_seconds: 1
    is_triage_target: false
    fields:
      "@timestamp": "{{ run_time | offset_seconds(1) }}"
      event.dataset: zeek.files
      event.module: zeek
      event.kind: event
      source.ip: "10.0.0.71"
      destination.ip: "193.42.39.117"
      network.community_id: "{{ same_as_triage }}"
      zeek.files.tx_hosts: ["193.42.39.117"]
      zeek.files.rx_hosts: ["10.0.0.71"]
      zeek.files.mime_type: "application/x-dosexec"
      zeek.files.total_bytes: 3145728
      zeek.files.md5: "e1adf8f9e7b3a6c5d4b9a8c7e6f5a4b3"
      zeek.files.sha256: "deadbeef1234567890abcdefdeadbeef1234567890abcdefdeadbeef12345678"
      synth.scenario_id: e2-urlhaus-pe-delivery

  - index: logs-synth-zeek-conn
    time_offset_seconds: 0
    is_triage_target: false
    fields:
      "@timestamp": "{{ run_time }}"
      event.dataset: zeek.conn
      event.module: zeek
      event.kind: event
      source.ip: "10.0.0.71"
      source.port: 50123
      destination.ip: "193.42.39.117"
      destination.port: 80
      network.transport: tcp
      network.community_id: "{{ same_as_triage }}"
      zeek.conn.state: "SF"
      zeek.conn.history: "ShAdFaf"
      zeek.conn.duration: 4.2
      zeek.conn.orig_bytes: 412
      zeek.conn.resp_bytes: 3146140
      zeek.conn.local_orig: true
      zeek.conn.local_resp: false
      synth.scenario_id: e2-urlhaus-pe-delivery

rubric_notes: |
  Easy TP. Three corroborating signals on the same flow: (1) URLhaus listing
  of destination.ip via the abuse.ch ruleset's ET DROP rule, (2) MIME mismatch
  (HTTP URI looked like .png, body was application/x-dosexec), (3) first-seen
  destination relative to the host's baseline. System MUST cite the blocklist
  hit and the MIME mismatch. Acceptable to additionally note the SHA-256 for
  IOC distribution.
