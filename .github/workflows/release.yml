name: release

# On a version tag (`v1.2.3`): run the full CI gate, then build the Dockerfile
# and publish it to GHCR as ghcr.io/nuk3s/soc-ai:{version} and :latest.
#
# Multi-arch (linux/amd64 + linux/arm64): all three base images in the
# Dockerfile (ghcr.io/astral-sh/uv:python3.12-bookworm-slim,
# node:20-bookworm-slim, python:3.12-slim) publish arm64 variants, and no build
# step is arch-specific (apt packages, locked wheels, npm) — the arm64 half
# builds under QEMU emulation, hence the generous timeout.
#
# One-time repo setup after the first tag: the GHCR package is PRIVATE by
# default — flip it to public under Package settings → Change visibility so
# `docker compose pull` works anonymously.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Reuse the exact CI workflow (ruff/mypy/pytest + frontend + browser smoke)
  # via its workflow_call trigger, so the release gate can never drift from CI.
  ci:
    name: ci
    uses: ./.github/workflows/ci.yml

  image:
    name: build + push image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: ci
    permissions:
      contents: read
      packages: write # push to ghcr.io with the workflow's GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v7

      # QEMU provides the arm64 emulation for the multi-arch build.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # v1.2.3 → the `1.2.3` tag; `latest` is added by the default
      # `latest=auto` flavor (skipped for pre-release tags like v1.2.3-rc1).
      # Also emits the standard OCI annotation labels.
      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
