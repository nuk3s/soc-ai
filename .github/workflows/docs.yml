name: docs

# Build the Material for MkDocs site and deploy it to GitHub Pages on every push
# to main. Enable Pages once in the repo settings (Settings -> Pages -> Source:
# GitHub Actions) and the site publishes to https://nuk3s.github.io/soc-ai/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Workflow-level: least privilege (read only). The Pages deploy scopes
# (pages: write + id-token: write) are granted ONLY on the deploy job below, so
# the build job — which runs `pip install` — never holds a deploy/OIDC token.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs Material
        # Pin exactly (not `>=`) so a docs build is reproducible and a surprise
        # upstream release can't change the published site without a repo edit.
        run: pip install "mkdocs-material==9.7.6"

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    # The Pages deploy needs these scopes; grant them here (not workflow-level)
    # so only this job — which runs no untrusted install — holds them.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
