name: release

# On a version tag (`v1.2.3`): run the full CI gate, then build the Dockerfile
# and publish it to GHCR as ghcr.io/nuk3s/soc-ai:{version} and :latest.
#
# Multi-arch (linux/amd64 + linux/arm64): all three base images in the
# Dockerfile (ghcr.io/astral-sh/uv:python3.12-bookworm-slim,
# node:22-bookworm-slim, python:3.12-slim) publish arm64 variants, and no build
# step is arch-specific (apt packages, locked wheels, npm) — the arm64 half
# builds under QEMU emulation, hence the generous timeout.
#
# One-time repo setup after the first tag: the GHCR package is PRIVATE by
# default — flip it to public under Package settings → Change visibility so
# `docker compose pull` works anonymously.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Reuse the exact CI workflow (ruff/mypy/pytest + frontend + browser smoke)
  # via its workflow_call trigger, so the release gate can never drift from CI.
  ci:
    name: ci
    uses: ./.github/workflows/ci.yml

  image:
    name: build + push image (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: ci
    permissions:
      contents: read
      packages: write # push to ghcr.io with the workflow's GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v7

      # QEMU provides the arm64 emulation for the multi-arch build.
      # Third-party actions are SHA-pinned (supply-chain hardening; the tj-actions
      # compromise class) with the human-readable version in a trailing comment.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # v1.2.3 → the `1.2.3` tag; `latest` is added by the default
      # `latest=auto` flavor (skipped for pre-release tags like v1.2.3-rc1).
      # Also emits the standard OCI annotation labels.
      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build + push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create/update the GitHub Release object for this tag (the Releases page),
  # with the body sourced from the matching CHANGELOG.md section. release.yml used
  # to only push the GHCR image, so a tag shipped an image but never a Release —
  # 1.2.1/1.2.2 had to be backfilled by hand. This closes that gap. Runs only
  # after the image build succeeds (needs: image), so a Release never points at a
  # tag whose image failed to publish.
  github_release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: write # create/edit the Release on the Releases page
    steps:
      - uses: actions/checkout@v7

      - name: Create or update the Release from CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"   # e.g. v1.2.3
          ver="${tag#v}"             # 1.2.3
          # Body = everything under the '## [ver]' heading up to the next version
          # heading (literal substring match, so dots aren't treated as regex).
          notes="$(awk -v ver="$ver" 'index($0,"## [" ver "]")==1{grab=1;next} grab&&/^## \[/{exit} grab{print}' CHANGELOG.md)"
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="Release ${tag}. See CHANGELOG.md."
          fi
          printf '%s\n' "$notes" > "${RUNNER_TEMP}/notes.md"
          # Pre-release tags (v1.2.3-rc1) are flagged and never marked latest,
          # mirroring the image job's latest=auto behavior.
          case "$tag" in
            *-*) flag="--prerelease" ;;
            *)   flag="--latest" ;;
          esac
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "soc-ai ${ver}" --notes-file "${RUNNER_TEMP}/notes.md" "$flag"
          else
            gh release create "$tag" --title "soc-ai ${ver}" --notes-file "${RUNNER_TEMP}/notes.md" "$flag"
          fi
          echo "Published Release ${tag} (soc-ai ${ver}) ${flag}."
