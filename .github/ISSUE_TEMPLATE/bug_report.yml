name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **This is a public tracker — scrub real host IPs,
        hostnames, usernames, and alert data from everything you paste.** Never
        include secrets (API keys, passwords, `.env` contents).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, and what you got instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: If it's triage-related, include the detection/rule name.

  - type: input
    id: version
    attributes:
      label: soc-ai version
      description: "`/healthz` reports it, or `git rev-parse --short HEAD` in your checkout."
    validations:
      required: true

  - type: input
    id: so-version
    attributes:
      label: Security Onion version

  - type: dropdown
    id: deploy
    attributes:
      label: Deployment method
      options:
        - setup.sh (built from source)
        - setup.sh --prebuilt / GHCR image
        - docker compose (manual)
        - manual / systemd (no Docker)
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model + gateway
      description: "What `ANALYST_MODEL` points at, and the gateway serving it (e.g. LiteLLM → which model)."

  - type: textarea
    id: doctor
    attributes:
      label: soc-ai doctor output
      description: |
        Run `docker exec soc-ai python -m soc_ai doctor --json` (or
        `uv run soc-ai doctor --json` from a source checkout) and paste the
        output — it checks config, the local store, Security Onion,
        Elasticsearch, and the gateway in one shot. Redact anything sensitive.
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`docker compose logs soc-ai` around the failure. Scrub real IPs, hostnames, and alert data first."
      render: shell
