name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        # setup-uv publishes no floating v8 major tag (only v3–v7 float); pin the
        # exact latest so the ref resolves. v8.x runs on Node 24.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: ruff check
        run: uv run ruff check soc_ai/ tests/

      - name: ruff format check
        run: uv run ruff format --check soc_ai/ tests/

      - name: mypy
        run: uv run mypy soc_ai/

      - name: pytest
        run: uv run pytest -v

  # The React SPA (frontend/) — typecheck + production build so a broken UI can't
  # land silently. No eslint config is committed yet, so `lint` is omitted.
  frontend:
    name: frontend typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build
